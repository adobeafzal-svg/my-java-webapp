pipeline:
  name: mywebapp-java-ci
  identifier: mywebappjavaci
  projectIdentifier: mywebappnow
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Maven Compile
                  identifier: Maven_Compile
                  spec:
                    shell: Sh
                    command: mvn compile
              - step:
                  type: Run
                  name: Maven Test
                  identifier: Maven_Test
                  spec:
                    shell: Sh
                    command: mvn test
              - step:
                  type: Run
                  name: Maven package
                  identifier: Maven_package
                  spec:
                    shell: Sh
                    command: mvn package
  properties:
    ci:
      codebase:
        connectorRef: githubconnectorformywebapp
        repoName: my-java-webapp
        build: <+input>
